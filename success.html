<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful</title>
  <style>
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:#f4f7f5;
      color:#1d2b23;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }
    .card{
      background:#fff;
      padding:32px;
      border-radius:20px;
      box-shadow:0 20px 60px rgba(0,0,0,.08);
      text-align:center;
      max-width:520px;
      width:90%;
    }
    h2{color:#2f6b3f;margin-top:0}
    p{color:#6b7c72}
  </style>
</head>
<body>
  <div class="card">
    <h2>Payment Successful</h2>
    <p>Finalising your booking…</p>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const item = params.get("item");
    const type = params.get("type");

    if (!item || !type) {
      alert("Invalid booking.");
      location.href = "events.html";
    } else {
      location.href =
        `book-now.html?item=${encodeURIComponent(item)}&type=${encodeURIComponent(type)}&payment=success`;
    }
  </script>
</body>
</html>
