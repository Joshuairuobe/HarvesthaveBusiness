<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upcoming Events | Harvest Havens Farm</title>

  <style>
    :root {
      --bg: #0b0f0d;
      --card: #0f1512;
      --gold: #c8a45d;
      --text: #e6e6e6;
      --muted: rgba(255,255,255,0.6);
      --border: rgba(255,255,255,0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #121816, #070a09);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
      background: rgba(10, 14, 12, 0.75);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo img {
      height: 42px;
      border-radius: 8px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 24px;
    }

    nav a {
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.85;
      transition: 0.3s;
    }

    nav a:hover {
      color: var(--gold);
      opacity: 1;
    }

    .events-header {
      text-align: center;
      padding: 100px 20px 60px;
      border-bottom: 1px solid var(--border);
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.65), rgba(0,0,0,0.95)),
        url("myrex.jpg") center/cover no-repeat;
    }

    .events-header h1 {
      font-size: 46px;
      color: var(--gold);
      margin-bottom: 14px;
    }

    .events-header p {
      color: var(--muted);
      font-size: 16px;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.7;
    }

    .events-list {
      max-width: 1200px;
      margin: 100px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

    .event-card {
      background: linear-gradient(180deg, #0f1512, #0b0f0d);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: 0.35s ease;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .event-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    }

    .event-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .event-info {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .event-info h2 {
      color: var(--gold);
      font-size: 20px;
      margin-bottom: 6px;
    }

    .event-info p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .cta-button {
      margin-top: auto;
      display: inline-block;
      text-align: center;
      padding: 12px 22px;
      border-radius: 999px;
      background: linear-gradient(135deg, #d4af6a, #a8833c);
      color: #0b0f0d;
      font-weight: 600;
      letter-spacing: 1px;
      text-decoration: none;
      transition: 0.3s;
      box-shadow: 0 10px 30px rgba(200,164,93,0.35);
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 50px rgba(200,164,93,0.5);
    }

    footer {
      margin-top: 140px;
      padding: 40px 20px;
      text-align: center;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 768px) {
      .events-header h1 {
        font-size: 34px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="logo">
    <img src="my logo.png" alt="Harvest Haven Logo">
  </div>
  <nav>
    <ul>
      <li><a href="index.html">Menu</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="products.html">Attractions</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>

<section class="events-header">
  <h1>Upcoming Events at Harvest Havens Farm</h1>
  <p>Join us for exciting activities for the whole family.</p>
</section>

<section class="events-list" id="eventsList">
  <p>Loading events…</p>
</section>

<footer>
  <p>&copy; 2024 Harvest Havens Farm. All Rights Reserved.</p>
</footer>

<!-- 🔥 REALTIME DATABASE INTEGRATION -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* Firebase init */
const app = initializeApp({
  apiKey: "AIzaSyDjNcMWpJ8zO2j0Z4vH8GOFPHK2Tt8pOF4",
  authDomain: "harvesthaven-97c9c.firebaseapp.com",
  databaseURL: "https://harvesthaven-97c9c-default-rtdb.firebaseio.com",
  projectId: "harvesthaven-97c9c"
});

const db = getDatabase(app);
const eventsList = document.getElementById("eventsList");

function formatSlots(item){
  let out = [];

  if (item.weeklySlots) {
    Object.values(item.weeklySlots).forEach(daySlots => {
      Object.values(daySlots || {}).forEach(s => {
        if (s?.enabled) out.push(`${s.start}–${s.end}`);
      });
    });
  }

  if (item.dateOverrides) {
    Object.values(item.dateOverrides).forEach(dateSlots => {
      Object.values(dateSlots || {}).forEach(s => {
        if (s?.enabled) out.push(`${s.start}–${s.end}`);
      });
    });
  }

  if (!out.length && item.timeSlots) {
    Object.values(item.timeSlots).forEach(s => {
      if (s?.enabled) out.push(`${s.start}–${s.end}`);
    });
  }

  return out.length ? [...new Set(out)].join(", ") : "Times TBA";
}

/* Load events from Realtime DB */
const snap = await get(ref(db, "items"));

eventsList.innerHTML = "";

if (!snap.exists()) {
  eventsList.innerHTML = "<p>No events available at the moment.</p>";
} else {
  Object.entries(snap.val())
    .filter(([_, item]) => item.type === "event")
    .forEach(([id, event]) => {

     const slots = formatSlots(event);

      eventsList.innerHTML += `
        <div class="event-card">
          <img src="${event.image || 'placeholder.jpg'}" alt="${event.name}">
          <div class="event-info">
            <h2>${event.name}</h2>
            <p><strong>Available Slots:</strong> ${slots}</p>
            <p><strong>Capacity:</strong> ${event.capacity}</p>
            <p><strong>From £${event.pricing?.adult ?? 0}</strong></p>
            <a href="book-now.html?type=event&item=${encodeURIComponent(event.name)}"
               class="cta-button">
              Buy Tickets
            </a>
          </div>
        </div>
      `;
    });
}
</script>

</body>
</html>
