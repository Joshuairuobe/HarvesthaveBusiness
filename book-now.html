/* INIT */
const app = initializeApp({

/* PARAMS */

const returnedSessionId = p.get("session_id");

const itemId = `${type}_${itemName.toLowerCase().replace(/[^a-z0-9]+/g,"-")}`;

/* DOM */
const titleEl = document.getElementById("title");
const subtitleEl = document.getElementById("subtitle");
const eventImage = document.getElementById("eventImage");
const timeEl = document.getElementById("time");
const pricePreview = document.getElementById("pricePreview");
const priceNote = document.getElementById("priceNote");
const paymentStatus = document.getElementById("paymentStatus");
const successMsg = document.getElementById("successMsg");
const successDetails = document.getElementById("successDetails");
const qrBox = document.getElementById("qrTicket");
const logoutBtn = document.getElementById("logoutBtn");
const userLabel = document.getElementById("userLabel");
const recoveryBox = document.getElementById("recoveryBox");
const errorBox = document.getElementById("errorBox");

const dateEl = document.getElementById("date");
const bookingForm = document.getElementById("bookingForm");
const nameEl = document.getElementById("name");

const adultCount = document.getElementById("adultCount");
const childCount = document.getElementById("childCount");
const seniorCount = document.getElementById("seniorCount");
const payNowBtn = document.getElementById("payNowBtn");
const myBookingsCard = document.getElementById("myBookingsCard");
const myBookingsList = document.getElementById("myBookingsList");
const bookAnotherBtn = document.getElementById("bookAnotherBtn");
const viewBookingsBtn = document.getElementById("viewBookingsBtn");
const today = new Date().toISOString().split("T")[0];
dateEl.min = today;
const homeBtn = document.getElementById("homeBtn");
const homeBtnSuccess = document.getElementById("homeBtnSuccess");
/* UI TEXT */
titleEl.textContent = itemName;
subtitleEl.textContent = type === "event" ? "Event Booking" : "Attraction Booking";

/* Redirect helper */
function goLogin(){
  const returnUrl = encodeURIComponent(location.href);
  location.href = `login.html?return=${returnUrl}`;
}

/* STORAGE KEYS */
const PENDING_KEY = "hh_pendingBooking";
const COMPLETED_KEY = "hh_completedBooking";

/* STATE */
let prices = { adult:15, child:8, senior:10 };
let capacity = 100;
let slots = {};
let bookingCompleted = false;
let completedBookingData = null;
let availabilityListenerRef = null;
/* HELPERS */
function showRecovery(message){
  recoveryBox.textContent = message;
  recoveryBox.classList.remove("hidden");
}
function hideRecovery(){
  recoveryBox.textContent = "";
  recoveryBox.classList.add("hidden");
}
function showError(message){
  errorBox.textContent = message;
  errorBox.classList.remove("hidden");
}
function hideError(){
  errorBox.textContent = "";
  errorBox.classList.add("hidden");
}
function savePendingBooking(data){
  localStorage.setItem(PENDING_KEY, JSON.stringify(data));
}
function getPendingBooking(){
  try{
    const raw = localStorage.getItem(PENDING_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch{
    return null;
  }
}
function clearPendingBooking(){
  localStorage.removeItem(PENDING_KEY);
}
function saveCompletedBooking(data){
  completedBookingData = data;
  localStorage.setItem(COMPLETED_KEY, JSON.stringify(data));
}
function getCompletedBooking(){
  try{
    if (completedBookingData) return completedBookingData;
    const raw = localStorage.getItem(COMPLETED_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch{
    return null;
  }
}
function formatCompletedCreatedAt(createdAt){
  if (!createdAt) return "—";
  if (typeof createdAt === "string") return createdAt;
  return "—";
}
function renderSuccessUI(bookingId, bookingData){
  bookingCompleted = true;
  completedBookingData = {
    ...bookingData,
    bookingId
  };

  saveCompletedBooking(completedBookingData);

  bookingForm.classList.add("hidden");
  successMsg.classList.remove("hidden");
  paymentStatus.textContent = "";
  hideRecovery();
  hideError();

  const details = [
    bookingData?.customerName ? `Name: ${bookingData.customerName}` : "",
    bookingData?.date ? `Date: ${bookingData.date}` : "",
    bookingData?.timeSlot ? `Time: ${bookingData.timeSlot}` : "",
    bookingData?.totalPrice != null ? `Paid: £${bookingData.totalPrice}` : "",
    bookingId ? `Booking ID: ${bookingId}` : ""
  ].filter(Boolean).join(" • ");

  successDetails.textContent = details;

  qrBox.innerHTML = "";
  new QRCode(qrBox, {
    text: `BOOKING:${bookingId || "UNKNOWN"}`,
    width: 120,
    height: 120
    

  });
  myBookingsCard.classList.remove("hidden");
  loadMyBookings();
}
function restoreSuccessFromLocal(){
  const saved = getCompletedBooking();
  if (!saved) return false;

  const sameItem = saved.itemId === itemId;
  if (!sameItem) return false;

  renderSuccessUI(saved.bookingId || bookingIdParam || "UNKNOWN", saved);
  return true;
}
async function findExistingBookingBySessionId(sessionId){
  if (!sessionId) return null;

  const q = query(
    collection(db, "bookings"),
    where("stripeSessionId", "==", sessionId)
  );

  const snap = await getDocs(q);
  if (snap.empty) return null;

  const first = snap.docs[0];
  return {
    id: first.id,
    ...first.data()
  };
}
function goHome(){
  location.href = "events.html";
}

homeBtn?.addEventListener("click", goHome);
homeBtnSuccess?.addEventListener("click", goHome);
/* AUTH */
onAuthStateChanged(auth, async (u) => {
  if (!u) return goLogin();

  if ((u.email || "").toLowerCase() === "harvesthaven10@harvesthaven.com") {
    alert("Admin accounts cannot make bookings.");
    location.href = "admin.html";
    return;
  }

  if (!u.emailVerified) {
    alert("Please verify your email first.");
    return goLogin();
  }

  const userDoc = await getDoc(doc(db, "users", u.uid));
  const profile = userDoc.exists() ? userDoc.data() : null;

  if (!profile || !profile.name) {
    alert("Your account setup is incomplete. Please complete sign up.");
    location.href = `signup.html?return=${encodeURIComponent(location.href)}`;
    return;
  }

  userLabel.textContent = `Logged in as ${u.email}`;
  nameEl.value = profile.name || "";

  await loadItemFromRTDB();
myBookingsCard.classList.remove("hidden");
await loadMyBookings();
  if (paymentStatusParam === "cancelled") {
    paymentStatus.textContent = "";
    showRecovery("Payment was cancelled. Your booking was not completed.");
    payNowBtn.disabled = false;
  }

  if (bookingSuccessParam === "1") {
    restoreSuccessFromLocal();
  }

  if (paymentStatusParam === "success" || returnedSessionId) {
    await completeBookingAfterPayment();
  }


});

/* Logout */
logoutBtn.onclick = ()=> signOut(auth).then(goLogin);

/* LOAD ITEM */
async function loadItemFromRTDB(){
  const itemSnap = await get(ref(rtdb, `items/${itemId}`));

  if (!itemSnap.exists()){
    priceNote.textContent = "This item is not available.";
    timeEl.innerHTML = `<option value="">No slots available</option>`;
    return;
  }

  const d = itemSnap.val();
  prices = d.pricing || prices;
  capacity = Number(d.capacity) || 100;

  const weeklySlots = d.weeklySlots || null;
  const dateOverrides = d.dateOverrides || null;
  const oldDateSlots = d.dateSlots || {};
  const oldDefaultSlots = d.timeSlots || {};

  slots = { weeklySlots, dateOverrides, oldDateSlots, oldDefaultSlots };

  if (d.image) eventImage.src = d.image;

  priceNote.textContent =
    `Prices — Adult £${prices.adult}, Child £${prices.child}, Senior £${prices.senior}`;

  await renderSlots();
  calc();
}

async function fetchSlotsForDate(dateStr){
  if (!dateStr) return;

  const itemSnap = await get(ref(rtdb, `items/${itemId}`));
  if (!itemSnap.exists()) return;

  const d = itemSnap.val();
  slots.weeklySlots = d.weeklySlots || {};
  slots.dateOverrides = d.dateOverrides || {};

  await renderSlots();
}

dateEl.onchange = async () => {
  timeEl.value = "";
  await fetchSlotsForDate(dateEl.value);
  watchAvailabilityForDate(dateEl.value);
};

function weekdayKeyFromDate(dateStr){
  const day = new Date(dateStr + "T00:00:00").getDay();
  return ["sun","mon","tue","wed","thu","fri","sat"][day];
}

function isPastSlot(dateStr, startTime){
  const now = new Date();
  const [year, month, day] = dateStr.split("-").map(Number);
  const [hour, minute] = startTime.split(":").map(Number);
  const slotStart = new Date(year, month - 1, day, hour, minute, 0);
  return slotStart <= now;
}

async function renderSlots() {
  timeEl.innerHTML = `<option value="">Select a date first</option>`;
  if (!dateEl.value) return;

  timeEl.innerHTML = `<option value="">Select time slot</option>`;

  const dateStr = dateEl.value;
  const dayKey = weekdayKeyFromDate(dateStr);
  const slotList = [];

  const override = slots?.dateOverrides?.[dateStr];
  if (override) {
    for (const [slotKey, v] of Object.entries(override)) {
      if (v?.enabled) slotList.push({ slotKey, start: v.start, end: v.end });
    }
  }

  if (!slotList.length && slots?.weeklySlots?.[dayKey]) {
    for (const [slotKey, v] of Object.entries(slots.weeklySlots[dayKey])) {
      if (v?.enabled) slotList.push({ slotKey, start: v.start, end: v.end });
    }
  }

  if (!slotList.length && slots?.oldDateSlots?.[dateStr]) {
    for (const [slotKey, v] of Object.entries(slots.oldDateSlots[dateStr])) {
      if (v?.enabled) {
        slotList.push({
          slotKey,
          start: v.start ?? slotKey.split("-")[0],
          end: v.end ?? slotKey.split("-")[1]
        });
      }
    }
  }

  if (!slotList.length && slots?.oldDefaultSlots) {
    for (const [slotKey, v] of Object.entries(slots.oldDefaultSlots)) {
      if (v?.enabled) {
        slotList.push({
          slotKey,
          start: v.start ?? slotKey.split("-")[0],
          end: v.end ?? slotKey.split("-")[1]
        });
      }
    }
  }

  for (const s of slotList) {
    if (isPastSlot(dateStr, s.start)) continue;

    const snap = await get(ref(rtdb, `availability/${itemId}/${dateStr}/${s.slotKey}`));
    const booked = snap.exists() ? Number(snap.val().booked || 0) : 0;
    const max = snap.exists() && snap.val().max != null ? Number(snap.val().max) : capacity;
    const remaining = Math.max(0, max - booked);

    if (remaining <= 0) continue;

    const o = document.createElement("option");
    o.value = s.slotKey;
    o.textContent = `${s.start}–${s.end} — ${remaining} spaces left`;
    timeEl.appendChild(o);
  }

  if (timeEl.options.length <= 1) {
    timeEl.innerHTML = `<option value="">No slots available for this date</option>`;
  }
}

/* TOTAL */
function calc(){
  const a = +adultCount.value || 0;
  const c = +childCount.value || 0;
  const s = +seniorCount.value || 0;
  const total = (a * (Number(prices.adult) || 0)) +
                (c * (Number(prices.child) || 0)) +
                (s * (Number(prices.senior) || 0));
  pricePreview.textContent = `Total: £${total}`;
  return { total, qty: a + c + s, a, c, s };
}
adultCount.oninput = childCount.oninput = seniorCount.oninput = calc;

/* START STRIPE */
payNowBtn.onclick = async () => {
  hideRecovery();
  hideError();

  const { total, qty, a, c, s } = calc();

  if (qty > capacity) {
    return alert(`You cannot book more than ${capacity} people in one booking.`);
  }
  if (qty <= 0) return alert("Select at least one ticket");
  if (total <= 0) return alert("Total is £0 — check admin prices");
  if (!dateEl.value) return alert("Select a date first");
  if (!timeEl.value) return alert("Select a time slot first");
  if (!nameEl.value.trim()) return alert("Please enter your name");

  payNowBtn.disabled = true;
  paymentStatus.textContent = "Redirecting to secure payment…";

  try {
    const slotSnap = await get(ref(rtdb, `availability/${itemId}/${dateEl.value}/${timeEl.value}`));

    if (slotSnap.exists()) {
      const booked = Number(slotSnap.val().booked || 0);
      const max = slotSnap.val().max != null ? Number(slotSnap.val().max) : Number(capacity);
      const remaining = Math.max(0, max - booked);

      if (qty > remaining) {
        payNowBtn.disabled = false;
        paymentStatus.textContent = "";
        return alert(`Only ${remaining} spaces left for this slot.`);
      }
    }

    const pendingBooking = {
      itemId,
      itemName,
      type,
      customerName: nameEl.value.trim(),
      date: dateEl.value,
      timeSlot: timeEl.value,
      tickets: { adult: a, child: c, senior: s },
      totalPrice: total,
      createdAtLocal: new Date().toISOString(),
      userEmail: auth.currentUser?.email || "",
      userId: auth.currentUser?.uid || ""
    };

    savePendingBooking(pendingBooking);

    const payload = {
      itemName,
      type,
      amount: Math.round(total * 100),
      date: dateEl.value,
      timeSlot: timeEl.value,
      tickets: { adult: a, child: c, senior: s },
      userEmail: auth.currentUser?.email || "unknown",
      successUrl: `${location.origin}${location.pathname}?item=${encodeURIComponent(itemName)}&type=${encodeURIComponent(type)}&payment=success&session_id={CHECKOUT_SESSION_ID}`,
      cancelUrl: `${location.origin}${location.pathname}?item=${encodeURIComponent(itemName)}&type=${encodeURIComponent(type)}&payment=cancelled`
    };

    console.log("Sending payment payload:", payload);

    const response = await fetch(
      "https://createcheckoutsession-6fgozcf3nq-uc.a.run.app",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      }
    );

    const rawText = await response.text();
    console.log("Payment server response:", rawText);

    if (!response.ok) {
      throw new Error(`Payment server error: ${response.status} ${rawText}`);
    }

    let data;
    try {
      data = JSON.parse(rawText);
    } catch {
      throw new Error("Payment server returned invalid JSON.");
    }

    if (data?.url) {
      window.location.href = data.url;
    } else {
      throw new Error("Stripe checkout URL missing from response.");
    }

  } catch (err) {
    console.error("Payment error:", err);
    alert(`Payment failed: ${err.message || err}`);
    payNowBtn.disabled = false;
    paymentStatus.textContent = "";
    showError(err.message || "Payment could not be started.");
  }
};

/* RESERVE SLOT */
async function reserve(dateStr, slotKey, qty){
  const r = ref(rtdb, `availability/${itemId}/${dateStr}/${slotKey}`);

  const result = await runTransaction(r, current => {
    const existing = current || {};
    const booked = Number(existing.booked || 0);
    const max = existing.max != null ? Number(existing.max) : Number(capacity);

    if (booked + qty > max) {
      return;
    }

    return {
      max: max,
      booked: booked + qty
    };
  });

  if (!result.committed){
    throw new Error("This time slot is fully booked. Please pick another slot.");
  }
}

/* COMPLETE AFTER PAYMENT */
async function completeBookingAfterPayment() {
  if (bookingCompleted) return;

  hideRecovery();
  hideError();

  try {
    paymentStatus.textContent = "Finalising your booking…";

    if (returnedSessionId) {
      const existing = await findExistingBookingBySessionId(returnedSessionId);
      if (existing) {
        clearPendingBooking();
        renderSuccessUI(existing.id, {
          customerName: existing.customerName,
          itemId: existing.itemId,
          itemName: existing.itemName,
          type: existing.type,
          date: existing.date,
          timeSlot: existing.timeSlot,
          tickets: existing.tickets,
          totalPrice: existing.totalPrice,
          stripeSessionId: existing.stripeSessionId
        });

        history.replaceState(
          {},
          "",
          `${location.pathname}?item=${encodeURIComponent(itemName)}&type=${encodeURIComponent(type)}&bookingSuccess=1&bookingId=${encodeURIComponent(existing.id)}`
        );
        return;
      }
    }

    const pending = getPendingBooking();
    if (!pending) {
      paymentStatus.textContent = "";
      showRecovery("Payment returned, but this browser could not find the pending booking details. If payment succeeded, check Stripe and your Firestore bookings collection, or complete booking confirmation via webhook.");
      payNowBtn.disabled = false;
      return;
    }

    if (pending.itemId !== itemId) {
      paymentStatus.textContent = "";
      showRecovery("A pending booking was found, but it does not match this item.");
      payNowBtn.disabled = false;
      return;
    }

    const qty =
      Number(pending.tickets?.adult || 0) +
      Number(pending.tickets?.child || 0) +
      Number(pending.tickets?.senior || 0);

    await loadItemFromRTDB();
    if (dateEl.value) {
  watchAvailabilityForDate(dateEl.value);
}
    await reserve(pending.date, pending.timeSlot, qty);
    await fetchSlotsForDate(pending.date);

    const refDoc = await addDoc(collection(db, "bookings"), {
      userId: auth.currentUser.uid,
      userEmail: auth.currentUser.email || "",
      customerName: pending.customerName,
      itemId: pending.itemId,
      itemName: pending.itemName,
      type: pending.type,
      date: pending.date,
      timeSlot: pending.timeSlot,
      tickets: pending.tickets,
      totalPrice: pending.totalPrice,
      status: "paid",
      stripeSessionId: returnedSessionId || null,
      createdAt: serverTimestamp()
    });

    clearPendingBooking();

    renderSuccessUI(refDoc.id, {
      ...pending,
      stripeSessionId: returnedSessionId || null
    });

    history.replaceState(
      {},
      "",
      `${location.pathname}?item=${encodeURIComponent(itemName)}&type=${encodeURIComponent(type)}&bookingSuccess=1&bookingId=${encodeURIComponent(refDoc.id)}`
    );

  } catch (err) {
    console.error("Booking finalisation failed:", err);
    paymentStatus.textContent = "";
    payNowBtn.disabled = false;
    showError(err.message || "Booking finalisation failed");
    alert(err.message || "Booking finalisation failed");
  }
}

viewBookingsBtn?.addEventListener("click", async () => {
  myBookingsCard.classList.remove("hidden");
  await loadMyBookings();

function isUpcomingBooking(dateStr, timeSlot) {
  if (!dateStr) return false;

  const startTime = (timeSlot || "").split("-")[0] || "00:00";
  const [year, month, day] = dateStr.split("-").map(Number);
  const [hour, minute] = startTime.split(":").map(Number);

  const bookingDate = new Date(year, month - 1, day, hour || 0, minute || 0, 0);
  return bookingDate >= new Date();
}

async function loadMyBookings() {
  if (!auth.currentUser) {
    myBookingsList.innerHTML = "Please sign in to view your bookings.";
    return;
  }

  myBookingsList.innerHTML = "Loading…";

  try {
    const q = query(
      collection(db, "bookings"),
      where("userId", "==", auth.currentUser.uid)
    );

    const snap = await getDocs(q);

    if (snap.empty) {
      myBookingsList.innerHTML = "You have no bookings yet.";
      return;
    }

    const bookings = snap.docs
      .map(docSnap => ({ id: docSnap.id, ...docSnap.data() }))
      .sort((a, b) => {
        const aDate = `${a.date || ""} ${a.timeSlot || ""}`;
        const bDate = `${b.date || ""} ${b.timeSlot || ""}`;
        return aDate.localeCompare(bDate);
      });

    const upcoming = bookings.filter(b => isUpcomingBooking(b.date, b.timeSlot));
    const past = bookings.filter(b => !isUpcomingBooking(b.date, b.timeSlot));

    let html = "";

    if (upcoming.length) {
      html += `<h4 style="margin:12px 0 6px 0;">Upcoming</h4>`;
      html += upcoming.map(b => `
        <div class="myBookingItem">
          <strong>${b.itemName || "Booking"}</strong>
          <div>Date: ${b.date || "—"}</div>
          <div>Time: ${b.timeSlot || "—"}</div>
          <div>Total paid: £${b.totalPrice || 0}</div>
          <div>Status: ${b.status || "paid"}</div>
          <div class="bookingTag">Upcoming</div>
        </div>
      `).join("");
    }

    if (past.length) {
      html += `<h4 style="margin:14px 0 6px 0;">Previous</h4>`;
      html += past.map(b => `
        <div class="myBookingItem">
          <strong>${b.itemName || "Booking"}</strong>
          <div>Date: ${b.date || "—"}</div>
          <div>Time: ${b.timeSlot || "—"}</div>
          <div>Total paid: £${b.totalPrice || 0}</div>
          <div>Status: ${b.status || "paid"}</div>
        </div>
      `).join("");
    }

    myBookingsList.innerHTML = html || "You have no bookings yet.";
  } catch (err) {
    console.error("Failed to load user bookings:", err);
    myBookingsList.innerHTML = "Could not load your bookings right now.";
  }
}
function watchAvailabilityForDate(dateStr) {
  if (!dateStr) return;

  if (availabilityListenerRef) {
    off(availabilityListenerRef);
    availabilityListenerRef = null;
  }

  availabilityListenerRef = ref(rtdb, `availability/${itemId}/${dateStr}`);

  onValue(availabilityListenerRef, async () => {
    await renderSlots();
  });
}
