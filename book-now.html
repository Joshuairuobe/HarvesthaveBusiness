<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book | Harvest Havens Farm</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --green:#2f6b3f;
  --green-dark:#1f4d2c;
  --bg:#f4f7f5;
  --card:#ffffff;
  --muted:#6b7c72;
  --border:#e4e9e6;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:var(--bg);
  color:#1d2b23;
}
.container{
  max-width:640px;
  margin:50px auto;
  background:var(--card);
  padding:30px;
  border-radius:20px;
  box-shadow:0 30px 70px rgba(0,0,0,.08);
}
.hero img{
  width:100%;
  border-radius:16px;
  margin-bottom:20px;
  max-height:260px;
  object-fit:cover;
}
h2{margin:0;color:var(--green)}
.note{font-size:13px;color:var(--muted)}
input,select,button{
  width:100%;
  padding:14px;
  margin-top:14px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:15px;
}
button{
  background:var(--green);
  color:#fff;
  border:none;
  font-weight:700;
  cursor:pointer;
}
button:hover{background:var(--green-dark)}
.hidden{display:none}
.totalBox{
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  background:#f8faf9;
  border:1px solid var(--border);
  font-weight:700;
}
.payBtn{margin-top:10px;font-weight:700}
.payBtn.apple{background:#000}
.payBtn.google{background:#4285f4}
.payBtn.card{background:#2f6b3f}
.success{
  background:#e9f6ee;
  padding:16px;
  border-radius:14px;
  margin-top:16px;
  text-align:center;
  font-weight:700;
  color:var(--green);
}
#qrTicket{
  margin:16px auto;
  display:flex;
  justify-content:center;
}
.success button{background:#111;margin-top:10px;}
.topBar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}
.logoutBtn{
  background:#eef3f0;
  color:#2f6b3f;
}
</style>

<!-- QR + PDF libs -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
<div class="container">

  <div class="hero">
    <img id="eventImage" src="haven.jpg">
  </div>

  <h2 id="title">Booking</h2>
  <p id="subtitle" class="note"></p>

  <!-- DASHBOARD -->
  <div id="dashboard">

    <div class="topBar">
      <span id="userLabel" class="note"></span>
      <button class="logoutBtn" id="logoutBtn" type="button">Logout</button>
    </div>

    <form id="bookingForm">
      <!-- ✅ You can keep this name input if you want; we will prefill from profile -->
      <input id="name" placeholder="Full name" required>
      <input id="date" type="date" required>

      <select id="time" required>
        <option value="">Select time slot</option>
      </select>

      <input id="adultCount" type="number" min="0" placeholder="Adults">
      <input id="childCount" type="number" min="0" placeholder="Children">
      <input id="seniorCount" type="number" min="0" placeholder="Seniors">

      <div id="pricePreview" class="totalBox">Total: £0</div>
      <div id="priceNote" class="note"></div>

      <h4>Secure Payment</h4>
      <button type="button" id="payNowBtn" class="payBtn card">
  Pay Securely
</button>
      <div id="paymentStatus" class="note"></div>

    </form>

    <div id="successMsg" class="success hidden">
      Booking confirmed & paid ✅
      <div id="qrTicket"></div>
      <button type="button" onclick="downloadReceipt()">Download Receipt</button>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore, addDoc, collection, serverTimestamp, doc, getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getDatabase, ref, get, runTransaction
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* INIT */
const app = initializeApp({
  apiKey: "AIzaSyDjNcMWpJ8zO2j0Z4vH8GOFPHK2Tt8pOF4",
  authDomain: "harvesthaven-97c9c.firebaseapp.com",
  databaseURL: "https://harvesthaven-97c9c-default-rtdb.firebaseio.com",
  projectId: "harvesthaven-97c9c"
});

const auth = getAuth(app);
const db = getFirestore(app);
const rtdb = getDatabase(app);

/* PARAMS */
const p = new URLSearchParams(location.search);
const itemName = p.get("item");
const type = p.get("type");
const paymentStatusParam = p.get("payment");
const returnedSessionId = p.get("session_id");

if (!itemName || !type) {
  alert("Invalid booking link");
  location.href = "events.html";
}

const itemId = `${type}_${itemName.toLowerCase().replace(/[^a-z0-9]+/g,"-")}`;

/* DOM */
const titleEl = document.getElementById("title");
const subtitleEl = document.getElementById("subtitle");
const eventImage = document.getElementById("eventImage");
const timeEl = document.getElementById("time");
const pricePreview = document.getElementById("pricePreview");
const priceNote = document.getElementById("priceNote");
const paymentStatus = document.getElementById("paymentStatus");
const successMsg = document.getElementById("successMsg");
const qrBox = document.getElementById("qrTicket");
const logoutBtn = document.getElementById("logoutBtn");
const userLabel = document.getElementById("userLabel");

const dateEl = document.getElementById("date");
const bookingForm = document.getElementById("bookingForm");
const nameEl = document.getElementById("name");

const adultCount = document.getElementById("adultCount");
const childCount = document.getElementById("childCount");
const seniorCount = document.getElementById("seniorCount");
const payNowBtn = document.getElementById("payNowBtn");
const today = new Date().toISOString().split("T")[0];
dateEl.min = today;
/* UI TEXT */
titleEl.textContent = itemName;
subtitleEl.textContent = type === "event" ? "Event Booking" : "Attraction Booking";

/* Redirect helper */
function goLogin(){
  const returnUrl = encodeURIComponent(location.href);
  location.href = `login.html?return=${returnUrl}`;
}

/* STATE */
let prices = { adult:15, child:8, senior:10 };
let capacity = 100;
let slots = {};
let bookingCompleted = false;

/* AUTH */
onAuthStateChanged(auth, async (u) => {
  if(!u) return goLogin();

  if(u.email === "harvesthaven10@harvesthaven.com"){
    alert("Admin accounts cannot make bookings.");
    location.href = "admin.html";
    return;
  }

  if(!u.emailVerified){
    alert("Please verify your email first.");
    await signOut(auth);
    return goLogin();
  }

  const userDoc = await getDoc(doc(db, "users", u.uid));
  const profile = userDoc.exists() ? userDoc.data() : null;

  if(!profile || !profile.name || !profile.phone || profile.phoneVerified !== true){
    alert("Your account setup is incomplete. Please complete sign up.");
    await signOut(auth);
    return location.href = `signup.html?return=${encodeURIComponent(location.href)}`;
  }

  userLabel.textContent = `Logged in as ${u.email}`;
  nameEl.value = profile.name || "";

  await loadItemFromRTDB();

  /* if user returned from Stripe success */
  if (paymentStatusParam === "success" || returnedSessionId) {
    await completeBookingAfterPayment();
  }
});

/* Logout */
logoutBtn.onclick = ()=> signOut(auth).then(goLogin);

/* LOAD ITEM */
async function loadItemFromRTDB(){
  const itemSnap = await get(ref(rtdb, `items/${itemId}`));

  if (!itemSnap.exists()){
    priceNote.textContent = "This item is not available.";
    timeEl.innerHTML = `<option value="">No slots available</option>`;
    return;
  }

  const d = itemSnap.val();
  prices = d.pricing || prices;
  capacity = Number(d.capacity) || 100;

  const weeklySlots = d.weeklySlots || null;
  const dateOverrides = d.dateOverrides || null;
  const oldDateSlots = d.dateSlots || {};
  const oldDefaultSlots = d.timeSlots || {};

  slots = { weeklySlots, dateOverrides, oldDateSlots, oldDefaultSlots };

  if (d.image) eventImage.src = d.image;

  priceNote.textContent =
    `Prices — Adult £${prices.adult}, Child £${prices.child}, Senior £${prices.senior}`;

  await renderSlots();
  calc();
}

async function fetchSlotsForDate(dateStr){
  if (!dateStr) return;

  const itemSnap = await get(ref(rtdb, `items/${itemId}`));
  if (!itemSnap.exists()) return;

  const d = itemSnap.val();
  slots.weeklySlots = d.weeklySlots || {};
  slots.dateOverrides = d.dateOverrides || {};

  await renderSlots();
}

dateEl.onchange = async () => {
  timeEl.value = "";
  await fetchSlotsForDate(dateEl.value);
};
function weekdayKeyFromDate(dateStr){
  const day = new Date(dateStr + "T00:00:00").getDay();
  return ["sun","mon","tue","wed","thu","fri","sat"][day];
}
function isPastSlot(dateStr, startTime){
  const now = new Date();
  const slotStart = new Date(`${dateStr}T${startTime}:00`);
  return slotStart <= now;
}
async function renderSlots() {
  timeEl.innerHTML = `<option value="">Select a date first</option>`;
if (!dateEl.value) return;
timeEl.innerHTML = `<option value="">Select time slot</option>`;
  const dateStr = dateEl.value;
  const dayKey = weekdayKeyFromDate(dateStr);
  const slotList = [];

  const override = slots?.dateOverrides?.[dateStr];
  if (override) {
    for (const [slotKey, v] of Object.entries(override)) {
      if (v?.enabled) slotList.push({ slotKey, start: v.start, end: v.end });
    }
  }

  if (!slotList.length && slots?.weeklySlots?.[dayKey]) {
    for (const [slotKey, v] of Object.entries(slots.weeklySlots[dayKey])) {
      if (v?.enabled) slotList.push({ slotKey, start: v.start, end: v.end });
    }
  }

  if (!slotList.length && slots?.oldDateSlots?.[dateStr]) {
    for (const [slotKey, v] of Object.entries(slots.oldDateSlots[dateStr])) {
      if (v?.enabled) {
        slotList.push({
          slotKey,
          start: v.start ?? slotKey.split("-")[0],
          end: v.end ?? slotKey.split("-")[1]
        });
      }
    }
  }

  if (!slotList.length && slots?.oldDefaultSlots) {
    for (const [slotKey, v] of Object.entries(slots.oldDefaultSlots)) {
      if (v?.enabled) {
        slotList.push({
          slotKey,
          start: v.start ?? slotKey.split("-")[0],
          end: v.end ?? slotKey.split("-")[1]
        });
      }
    }
  }

  for (const s of slotList) {
    if (isPastSlot(dateStr, s.start)) continue;
    const snap = await get(ref(rtdb, `availability/${itemId}/${dateStr}/${s.slotKey}`));
    const booked = snap.exists() ? Number(snap.val().booked || 0) : 0;
    const max = snap.exists() && snap.val().max != null ? Number(snap.val().max) : capacity;
    const remaining = Math.max(0, max - booked);

    if (remaining <= 0) continue;

    const o = document.createElement("option");
    o.value = s.slotKey;
    o.textContent = `${s.start}–${s.end} — ${remaining} spaces left`;
    timeEl.appendChild(o);
  }

  if (timeEl.options.length <= 1) {
    timeEl.innerHTML = `<option value="">No slots available for this date</option>`;
  }
}

/* TOTAL */
function calc(){
  const a = +adultCount.value || 0;
  const c = +childCount.value || 0;
  const s = +seniorCount.value || 0;
  const total = (a * (Number(prices.adult) || 0)) +
                (c * (Number(prices.child) || 0)) +
                (s * (Number(prices.senior) || 0));
  pricePreview.textContent = `Total: £${total}`;
  return { total, qty: a + c + s, a, c, s };
}
adultCount.oninput = childCount.oninput = seniorCount.oninput = calc;

/* START STRIPE */
payNowBtn.onclick = async () => {
  const { total, qty, a, c, s } = calc();

  if (qty > capacity) {
    return alert(`You cannot book more than ${capacity} people in one booking.`);
  }
  if (qty <= 0) return alert("Select at least one ticket");
  if (total <= 0) return alert("Total is £0 — check admin prices");
  if (!dateEl.value) return alert("Select a date first");
  if (!timeEl.value) return alert("Select a time slot first");
  if (!nameEl.value.trim()) return alert("Please enter your name");

  payNowBtn.disabled = true;
  paymentStatus.textContent = "Redirecting to secure payment…";

  try {
    /* ✅ STEP 1: CHECK AVAILABILITY SAFELY */
    const slotSnap = await get(ref(rtdb, `availability/${itemId}/${dateEl.value}/${timeEl.value}`));

    if (slotSnap.exists()) {
      const booked = Number(slotSnap.val().booked || 0);
      const max = slotSnap.val().max != null ? Number(slotSnap.val().max) : Number(capacity);
      const remaining = Math.max(0, max - booked);

      if (qty > remaining) {
        payNowBtn.disabled = false;
        paymentStatus.textContent = "";
        return alert(`Only ${remaining} spaces left for this slot.`);
      }
    }

    /* ✅ STEP 2: SAVE TEMP BOOKING */
    const pendingBooking = {
      itemId,
      itemName,
      type,
      customerName: nameEl.value.trim(),
      date: dateEl.value,
      timeSlot: timeEl.value,
      tickets: { adult: a, child: c, senior: s },
      totalPrice: total
    };

    localStorage.setItem("pendingBooking", JSON.stringify(pendingBooking));

    /* ✅ STEP 3: PREPARE PAYMENT PAYLOAD */
    const payload = {
  itemName,
  type,
  amount: Math.round(total * 100),
      date: dateEl.value,
      timeSlot: timeEl.value,
      tickets: { adult: a, child: c, senior: s },
      userEmail: auth.currentUser?.email || "unknown",
      successUrl: `${location.origin}${location.pathname}?item=${encodeURIComponent(itemName)}&type=${encodeURIComponent(type)}&payment=success`,
      cancelUrl: `${location.origin}${location.pathname}?item=${encodeURIComponent(itemName)}&type=${encodeURIComponent(type)}&payment=cancelled`
    };

    console.log("🔵 Sending payment payload:", payload);

    /* ✅ STEP 4: CALL PAYMENT SERVER */
    const response = await fetch(
      "https://createcheckoutsession-6fgozcf3nq-uc.a.run.app",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      }
    );

    console.log("🟡 Response status:", response.status);

    const rawText = await response.text();
    console.log("🟡 Raw response:", rawText);

    if (!response.ok) {
      throw new Error(`Payment server error: ${response.status} ${rawText}`);
    }

    let data;
    try {
      data = JSON.parse(rawText);
    } catch {
      throw new Error("Payment server returned invalid JSON.");
    }

    console.log("🟢 Parsed response:", data);

    if (data?.url) {
      window.location.href = data.url;
    } else {
      throw new Error("Stripe checkout URL missing from response.");
    }

  } catch (err) {
    console.error("❌ Payment error:", err);
    alert(`Payment failed: ${err.message || err}`);
    payNowBtn.disabled = false;
    paymentStatus.textContent = "";
  }
};

/* RESERVE SLOT */
async function reserve(dateStr, slotKey, qty){
  const r = ref(rtdb, `availability/${itemId}/${dateStr}/${slotKey}`);

  const result = await runTransaction(r, current => {
    const existing = current || {};
    const booked = Number(existing.booked || 0);
    const max = existing.max != null ? Number(existing.max) : Number(capacity);

    if (booked + qty > max) {
      return;
    }

    return {
      max: max,
      booked: booked + qty
    };
  });

  if (!result.committed){
    throw new Error("This time slot is fully booked. Please pick another slot.");
  }
}
/* COMPLETE AFTER PAYMENT */
async function completeBookingAfterPayment() {
  if (bookingCompleted) return;

  const raw = localStorage.getItem("pendingBooking");
  if (!raw) {
    paymentStatus.textContent = "Payment returned, but no pending booking was found.";
    return;
  }

  const pending = JSON.parse(raw);
  const qty =
    Number(pending.tickets?.adult || 0) +
    Number(pending.tickets?.child || 0) +
    Number(pending.tickets?.senior || 0);

  try {
    paymentStatus.textContent = "Finalising your booking…";

    await loadItemFromRTDB();
    await reserve(pending.date, pending.timeSlot, qty);
    await fetchSlotsForDate(pending.date);

    const refDoc = await addDoc(collection(db, "bookings"), {
      userId: auth.currentUser.uid,
      customerName: pending.customerName,
      itemId: pending.itemId,
      itemName: pending.itemName,
      type: pending.type,
      date: pending.date,
      timeSlot: pending.timeSlot,
      tickets: pending.tickets,
      totalPrice: pending.totalPrice,
      status: "paid",
      stripeSessionId: returnedSessionId || null,
      createdAt: serverTimestamp()
    });

    bookingCompleted = true;
    localStorage.removeItem("pendingBooking");

    bookingForm.classList.add("hidden");
    successMsg.classList.remove("hidden");
    paymentStatus.textContent = "";

    qrBox.innerHTML = "";
    new QRCode(qrBox, {
      text: `BOOKING:${refDoc.id}`,
      width: 120,
      height: 120
    });

    history.replaceState({}, "", `${location.pathname}?item=${encodeURIComponent(itemName)}&type=${encodeURIComponent(type)}&bookingSuccess=1`);
  } catch (err) {
    console.error(err);
    paymentStatus.textContent = "";
    alert(err.message || "Booking finalisation failed");
  }
}

/* PDF */
window.downloadReceipt = ()=>{
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();
  pdf.text("Harvest Havens Farm",20,20);
  pdf.text(`Item: ${itemName}`,20,40);
  pdf.text(`Date: ${dateEl.value || ""}`,20,50);
  pdf.text(`Time: ${timeEl.value || ""}`,20,60);
  pdf.text(`Total Paid: £${pricePreview.textContent.replace("Total: £","")}`,20,80);
  pdf.text("Status: PAID",20,95);
  pdf.save("HarvestHavensReceipt.pdf");
};
</script>
</body>
</html>
