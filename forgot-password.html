<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password | Harvest Havens</title>
<style>
:root{
  --bg:#0b0f0d;
  --card:#0f1512;
  --border:rgba(255,255,255,.10);
  --text:#eaf3ed;
  --muted:rgba(234,243,237,.70);
  --accent:#2f6b3f;
  --accent2:#1f4d2c;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px;
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:
    radial-gradient(900px 600px at 15% 15%, rgba(47,107,63,.35), transparent 55%),
    linear-gradient(180deg, #070a08, var(--bg));
  color:var(--text);
}
.shell{
  width:100%;
  max-width:440px;
  background:rgba(15,21,18,.92);
  border:1px solid var(--border);
  border-radius:22px;
  padding:26px;
  box-shadow:0 30px 90px rgba(0,0,0,.55);
  backdrop-filter: blur(10px);
}
h1{margin:0;font-size:22px}
p{margin:8px 0 0 0;color:var(--muted);font-size:13px;line-height:1.4}
input,button{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.03);
  color:var(--text);
  margin-top:12px;
  font-size:15px;
}
button{
  border:none;
  background:linear-gradient(180deg, var(--accent), var(--accent2));
  font-weight:800;
  cursor:pointer;
}
a{color:#bfe7c9;text-decoration:none}
a:hover{text-decoration:underline}
.msg{
  margin-top:12px;
  padding:12px;
  border-radius:14px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.03);
  color:var(--muted);
  font-size:13px;
}
</style>
</head>
<body>
  <div class="shell">
    <h1>Reset your password</h1>
    <p>Enter your email and we’ll send a password reset link.</p>

    <input id="email" type="email" placeholder="Email address">
    <button id="sendBtn">Send reset link</button>

    <p style="margin-top:12px;">
      <a id="backLink" href="login.html">Back to login</a>
    </p>

    <div id="msg" class="msg" style="display:none;"></div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyDjNcMWpJ8zO2j0Z4vH8GOFPHK2Tt8pOF4",
  authDomain: "harvesthaven-97c9c.firebaseapp.com",
  projectId: "harvesthaven-97c9c"
});
const auth = getAuth(app);

const qs = new URLSearchParams(location.search);
const returnUrl = qs.get("return") || "events.html";
document.getElementById("backLink").href = `login.html?return=${encodeURIComponent(returnUrl)}`;

const emailEl = document.getElementById("email");
const sendBtn = document.getElementById("sendBtn");
const msg = document.getElementById("msg");

function show(text){
  msg.style.display = "block";
  msg.textContent = text;
}

sendBtn.onclick = async () => {
  const email = emailEl.value.trim();
  if(!email) return show("Enter your email.");

  sendBtn.disabled = true;
  try{
    await sendPasswordResetEmail(auth, email);
    show("Reset email sent ✅ Please check your inbox.");
  }catch(e){
    show(e?.message || "Could not send reset email.");
  }finally{
    sendBtn.disabled = false;
  }
};
</script>
</body>
</html>
