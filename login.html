<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login | Harvest Havens</title>

<style>
:root{
  --bg:#0b0f0d;
  --card:#0f1512;
  --border:rgba(255,255,255,.10);
  --text:#eaf3ed;
  --muted:rgba(234,243,237,.70);
  --accent:#2f6b3f;
  --accent2:#1f4d2c;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px;
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;
  color:var(--text);
  overflow:hidden;
}

.bg-logos{
  position:fixed;
  inset:0;
  z-index:-1;
  overflow:hidden;
  background:
    radial-gradient(900px 600px at 15% 15%, rgba(47,107,63,.35), transparent 55%),
    radial-gradient(900px 600px at 85% 25%, rgba(31,77,44,.35), transparent 60%),
    linear-gradient(180deg, #070a08, var(--bg));
}

.floating-logo{
  position:absolute;
  width:180px;
  height:180px;
  background:url("my logo.png") center/contain no-repeat;
  opacity:.12;
  animation: float 40s linear infinite;
}

.floating-logo:nth-child(1){ top:10%; left:-10%; animation-duration:55s; }
.floating-logo:nth-child(2){ top:60%; left:-20%; width:120px; height:120px; animation-duration:45s; animation-delay:-10s; }
.floating-logo:nth-child(3){ top:30%; left:-15%; width:220px; height:220px; animation-duration:70s; animation-delay:-20s; }
.floating-logo:nth-child(4){ top:80%; left:-25%; width:140px; height:140px; animation-duration:60s; animation-delay:-30s; }

@keyframes float{
  from { transform: translateX(-10vw) rotate(0deg); }
  to   { transform: translateX(130vw) rotate(360deg); }
}

.navbar{
  position:fixed;
  top:16px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:18px;
  background:rgba(15,21,18,.85);
  border:1px solid var(--border);
  padding:10px 18px;
  border-radius:999px;
  backdrop-filter: blur(10px);
  z-index:10;
}

.navbar a{
  color:#bfe7c9;
  text-decoration:none;
  font-weight:600;
  font-size:14px;
  transition:.2s;
}

.navbar a:hover{
  color:#fff;
  transform:translateY(-1px);
}

.shell{
  width:100%;
  max-width:440px;
  background:rgba(15,21,18,.92);
  border:1px solid var(--border);
  border-radius:22px;
  padding:26px;
  box-shadow:0 30px 90px rgba(0,0,0,.55);
  backdrop-filter: blur(10px);
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}

.logo{
  width:44px;height:44px;border-radius:14px;
  background:linear-gradient(135deg, rgba(47,107,63,.9), rgba(31,77,44,.9));
  box-shadow:0 10px 30px rgba(47,107,63,.25);
}

h1{margin:0;font-size:22px;letter-spacing:.2px}
p{margin:6px 0 0 0;color:var(--muted);font-size:13px;line-height:1.4}

input,button{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.03);
  color:var(--text);
  margin-top:12px;
  font-size:15px;
}

input::placeholder{color:rgba(234,243,237,.55)}

button{
  border:none;
  background:linear-gradient(180deg, var(--accent), var(--accent2));
  font-weight:800;
  cursor:pointer;
}

button:disabled{opacity:.6;cursor:not-allowed}

.row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-top:12px;
  font-size:13px;
}

a{color:#bfe7c9;text-decoration:none}
a:hover{text-decoration:underline}

.msg{
  margin-top:12px;
  padding:12px;
  border-radius:14px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.03);
  color:var(--muted);
  font-size:13px;
}

.password-wrap{
  position:relative;
}

.password-wrap input{
  padding-right: 52px;
}

.toggle-pass{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  user-select:none;
  font-size:18px;
  line-height:1;
  opacity:.7;
  pointer-events:auto;
}

.toggle-pass:hover{
  opacity:1;
}
</style>
</head>

<body>

<div class="floating-logo"></div>
<div class="floating-logo"></div>
<div class="floating-logo"></div>
<div class="floating-logo"></div>

<nav class="navbar">
  <a href="index.html">Home</a>
  <a href="events.html">Events</a>
  <a href="products.html">Attractions</a>
</nav>

<div class="shell">
  <div class="brand">
    <div class="logo"></div>
    <div>
      <h1>Welcome back</h1>
      <p>Sign in to continue booking with Harvest Havens.</p>
    </div>
  </div>

  <input id="email" type="email" placeholder="Email address" autocomplete="username">

  <div class="password-wrap">
    <input id="password" type="password" placeholder="Password" autocomplete="current-password">
    <span id="togglePass" class="toggle-pass" aria-label="Toggle password visibility">👁️</span>
  </div>

  <button id="loginBtn">Sign In</button>

  <div class="row">
    <a id="signupLink" href="signup.html">Create an account</a>
    <a id="forgotLink" href="forgot-password.html">Forgot password?</a>
  </div>

  <div id="msg" class="msg" style="display:none;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  setPersistence,
  browserLocalPersistence,
  signInWithEmailAndPassword,
  sendEmailVerification,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyDjNcMWpJ8zO2j0Z4vH8GOFPHK2Tt8pOF4",
  authDomain: "harvesthaven-97c9c.firebaseapp.com",
  projectId: "harvesthaven-97c9c"
});

const auth = getAuth(app);

const qs = new URLSearchParams(location.search);
const returnUrl = qs.get("return") || "events.html";

const emailEl = document.getElementById("email");
const passEl = document.getElementById("password");
const togglePass = document.getElementById("togglePass");
const loginBtn = document.getElementById("loginBtn");
const msg = document.getElementById("msg");
const signupLink = document.getElementById("signupLink");
const forgotLink = document.getElementById("forgotLink");

signupLink.href = `signup.html?return=${encodeURIComponent(returnUrl)}`;
forgotLink.href = `forgot-password.html?return=${encodeURIComponent(returnUrl)}`;
togglePass.onclick = () => {
  const isHidden = passEl.type === "password";
  passEl.type = isHidden ? "text" : "password";
  togglePass.textContent = isHidden ? "🙈" : "👁️";
  passEl.focus();
};

function show(text){
  msg.style.display = "block";
  msg.textContent = text;
}

// persist session
await setPersistence(auth, browserLocalPersistence);

// redirect already-logged-in customers
onAuthStateChanged(auth, (user) => {
  if(user && user.email !== "harvesthaven10@harvesthaven.com"){
    location.href = returnUrl;
  }
});

loginBtn.onclick = async () => {
  const email = emailEl.value.trim();
  const password = passEl.value;
  if(!email || !password) return show("Enter your email and password.");

  loginBtn.disabled = true;
  try{
    const cred = await signInWithEmailAndPassword(auth, email, password);

    // block admin login here
    if(cred.user.email === "harvesthaven10@harvesthaven.com"){
      await signOut(auth);
      return show("Admin accounts must use the admin panel.");
    }

    // enforce email verification
    if(!cred.user.emailVerified){
      await sendEmailVerification(cred.user);
      await signOut(auth);
      return show("Verify your email. We sent you a link.");
    }

    // successful login
    location.href = returnUrl;

  }catch(e){
    show(e?.message || "Login failed.");
  }finally{
    loginBtn.disabled = false;
  }
};
</script>

</body>
</html>
