<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign Up | Harvest Havens</title>
<style>
:root{
  --bg:#0b0f0d;
  --card:#0f1512;
  --border:rgba(255,255,255,.10);
  --text:#eaf3ed;
  --muted:rgba(234,243,237,.70);
  --accent:#2f6b3f;
  --accent2:#1f4d2c;
  --danger:#ffb4b4;
  --success:#bfe7c9;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px;
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:
    radial-gradient(900px 600px at 15% 15%, rgba(47,107,63,.35), transparent 55%),
    radial-gradient(900px 600px at 85% 25%, rgba(31,77,44,.35), transparent 60%),
    linear-gradient(180deg, #070a08, var(--bg));
  color:var(--text);
}
.shell{
  width:100%;
  max-width:520px;
  background:rgba(15,21,18,.92);
  border:1px solid var(--border);
  border-radius:22px;
  padding:26px;
  box-shadow:0 30px 90px rgba(0,0,0,.55);
  backdrop-filter:blur(10px);
}
h1{
  margin:0;
  font-size:24px;
  line-height:1.2;
}
p{
  margin:8px 0 0 0;
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
}
input,button{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.03);
  color:var(--text);
  margin-top:12px;
  font-size:15px;
}
input::placeholder{color:rgba(234,243,237,.55)}
button{
  border:none;
  background:linear-gradient(180deg, var(--accent), var(--accent2));
  font-weight:800;
  cursor:pointer;
}
button.secondary{
  background:rgba(255,255,255,.06);
  border:1px solid var(--border);
}
button:disabled{opacity:.6;cursor:not-allowed}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.field{
  position:relative;
}
.toggle{
  position:absolute;
  right:14px;
  top:26px;
  font-size:12px;
  color:var(--muted);
  cursor:pointer;
  user-select:none;
}
.msg{
  margin-top:12px;
  padding:12px;
  border-radius:14px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.03);
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
}
.msg.error{
  color:var(--danger);
  border-color:rgba(255,180,180,.18);
}
.msg.success{
  color:var(--success);
  border-color:rgba(191,231,201,.18);
}
small{color:var(--muted)}
a{color:#bfe7c9;text-decoration:none}
a:hover{text-decoration:underline}
hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.badge{
  display:inline-block;
  margin-top:14px;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  color:var(--muted);
  font-size:12px;
}
@media (max-width:560px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
  <div class="shell">
    <h1>Create your account</h1>
    <p>Email-only signup. We’ll send a verification email before you can book.</p>
   

    <form id="signupForm" novalidate>
      <input id="fullName" placeholder="Full name" autocomplete="name" required>
      <input id="email" type="email" placeholder="Email address" autocomplete="username" required>

      <div class="field">
        <input id="password" type="password" placeholder="Password (min 6 chars)" autocomplete="new-password" required>
        <span class="toggle" data-target="password">Show</span>
      </div>

      <div class="field">
        <input id="confirmPassword" type="password" placeholder="Confirm password" autocomplete="new-password" required>
        <span class="toggle" data-target="confirmPassword">Show</span>
      </div>

      <button id="signupBtn" type="submit">Create Account</button>
      <button id="resendBtn" type="button" class="secondary" style="display:none;">Resend Verification Email</button>

      <hr>
      <small>Already have an account? <a id="loginLink" href="login.html">Sign in</a></small>

      <div id="msg" class="msg" style="display:none;"></div>
    </form>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  setPersistence,
  browserLocalPersistence,
  createUserWithEmailAndPassword,
  updateProfile,
  sendEmailVerification,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDjNcMWpJ8zO2j0Z4vH8GOFPHK2Tt8pOF4",
  authDomain: "harvesthaven-97c9c.firebaseapp.com",
  projectId: "harvesthaven-97c9c"
});

const auth = getAuth(app);
const db = getFirestore(app);

await setPersistence(auth, browserLocalPersistence);

const qs = new URLSearchParams(location.search);
const returnUrl = qs.get("return") || "events.html";

const fullNameEl = document.getElementById("fullName");
const emailEl = document.getElementById("email");
const passEl = document.getElementById("password");
const confirmPassEl = document.getElementById("confirmPassword");
const signupBtn = document.getElementById("signupBtn");
const resendBtn = document.getElementById("resendBtn");
const msg = document.getElementById("msg");
const loginLink = document.getElementById("loginLink");

loginLink.href = `login.html?return=${encodeURIComponent(returnUrl)}`;

let lastCreatedUser = null;

function showMessage(text, type = ""){
  msg.style.display = "block";
  msg.className = `msg ${type}`.trim();
  msg.textContent = text;
}

function clearMessage(){
  msg.style.display = "none";
  msg.className = "msg";
  msg.textContent = "";
}

function setLoading(isLoading){
  signupBtn.disabled = isLoading;
  signupBtn.textContent = isLoading ? "Creating..." : "Create Account";
}

document.querySelectorAll(".toggle").forEach(el => {
  el.addEventListener("click", () => {
    const target = document.getElementById(el.dataset.target);
    const isPassword = target.type === "password";
    target.type = isPassword ? "text" : "password";
    el.textContent = isPassword ? "Hide" : "Show";
  });
});

function isValidEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

document.getElementById("signupForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  clearMessage();

  const name = fullNameEl.value.trim();
  const email = emailEl.value.trim().toLowerCase();
  const password = passEl.value;
  const confirmPassword = confirmPassEl.value;

  if (!name || name.length < 2) {
    return showMessage("Please enter your full name.", "error");
  }

  if (!isValidEmail(email)) {
    return showMessage("Please enter a valid email address.", "error");
  }

  if (!password || password.length < 6) {
    return showMessage("Password must be at least 6 characters.", "error");
  }

  if (password !== confirmPassword) {
    return showMessage("Passwords do not match.", "error");
  }

  setLoading(true);
  resendBtn.style.display = "none";

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    lastCreatedUser = cred.user;

    await updateProfile(cred.user, {
      displayName: name
    });

    await setDoc(doc(db, "users", cred.user.uid), {
      name,
      email,
      createdAt: serverTimestamp()
    });

    await sendEmailVerification(cred.user, {
      url: `${location.origin}${location.pathname.replace("signup.html", "login.html")}?return=${encodeURIComponent(returnUrl)}`
    });

    await signOut(auth);

    showMessage(
      "Account created successfully. We sent a verification email to your inbox. Please verify your email, then sign in to continue.",
      "success"
    );

    resendBtn.style.display = "block";

  } catch (e) {
    console.error("Signup failed:", e);

    if (e?.code === "auth/email-already-in-use") {
      showMessage("This email is already registered. Please sign in instead.", "error");
    } else if (e?.code === "auth/invalid-email") {
      showMessage("That email address is invalid.", "error");
    } else if (e?.code === "auth/weak-password") {
      showMessage("Use a stronger password with at least 6 characters.", "error");
    } else {
      showMessage(e?.message || "Sign up failed.", "error");
    }
  } finally {
    setLoading(false);
  }
});

resendBtn.addEventListener("click", async () => {
  clearMessage();

  if (!lastCreatedUser) {
    return showMessage("Create your account first before resending verification.", "error");
  }

  resendBtn.disabled = true;
  resendBtn.textContent = "Sending...";

  try {
    await sendEmailVerification(lastCreatedUser, {
      url: `${location.origin}${location.pathname.replace("signup.html", "login.html")}?return=${encodeURIComponent(returnUrl)}`
    });

    showMessage("Verification email sent again. Check your inbox.", "success");
  } catch (e) {
    console.error("Resend failed:", e);
    showMessage(e?.message || "Could not resend verification email.", "error");
  } finally {
    resendBtn.disabled = false;
    resendBtn.textContent = "Resend Verification Email";
  }
});
</script>
</body>
</html>
